<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reporte Ciudadano</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="container">
    <h1>Reporte de Problemas Urbanos</h1>

    <form id="formReporte">
      
      <label>Descripción</label>
      <input type="text" id="descripcion" placeholder="Describe el problema" required>

      <label>Ubicación</label>
      <input type="text" id="ubicacion" placeholder="Ej: Calle 10 con carrera 5" required>

      <label>Imagen</label>
      <input type="file" id="imagen" accept="image/*">

      <img id="preview" alt="Vista previa">

      <button type="submit">Enviar Reporte</button>

    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
