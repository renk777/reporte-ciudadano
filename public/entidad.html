<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Entidad - Reporte Ciudadano</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body { font-family: 'Segoe UI', sans-serif; background: #f0f4f8; min-height: 100vh; }

    body { background-image: url(https://zenuradio.com/wp-content/uploads/2022/12/DSC_1855-1024x678.webp); background-position: center; background-size: cover; background-repeat: no-repeat;}

    header {
      background: #1a5e3a;
      color: white;
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    img {
      display: flex;
      max-width: 7%;  
      height: 7%;    
      margin-left: 1100px; 
    }

    header h1 { font-size: 18px; }
    header span { font-size: 13px; opacity: 0.8; }

    .btn-cerrar {
      background: rgba(255,255,255,0.2);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .btn-cerrar:hover { background: rgba(255,255,255,0.3); }

    .stats {
      display: flex;
      gap: 16px;
      padding: 20px 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: white;
      border-radius: 10px;
      padding: 16px 24px;
      flex: 1;
      min-width: 150px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }

    .stat-card .numero { font-size: 32px; font-weight: 700; color: #1a5e3a; }
    .stat-card .etiqueta { font-size: 12px; color: #666; margin-top: 4px; }

    .contenido { padding: 0 30px 30px; }

    .titulo-seccion { font-size: 16px; font-weight: 700; color: #1a5e3a; margin-bottom: 12px; }

    table {
      width: 100%;
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-collapse: collapse;
      overflow: hidden;
    }

    thead { background: #1a5e3a; color: white; }
    th, td { padding: 12px 16px; text-align: left; font-size: 14px; }
    tr:not(:last-child) td { border-bottom: 1px solid #f0f0f0; }
    tr:hover td { background: #f9fbfd; }

    .estado-badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .estado-Pendiente   { background: #fff3cd; color: #856404; }
    .estado-Asignado    { background: #cce5ff; color: #004085; }
    .estado-En\ proceso { background: #d4edda; color: #155724; }
    .estado-Solucionado { background: #d1ecf1; color: #0c5460; }

    .acciones { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

    .estado-select {
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-guardar {
      background: #1a5e3a;
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-guardar:hover { background: #145230; }

    .btn-fotos {
      background: #6c757d;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-fotos:hover { background: #495057; }

    .cargando { text-align: center; padding: 40px; color: #666; }

    
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.activo { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      padding: 30px;
      width: 700px;
      max-width: 95%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal h2 { font-size: 18px; color: #0acb67; margin-bottom: 16px; }

    .fotos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .fotos-grid img {
      width: 100%;
      height: 140px;
      object-fit: cover;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
    }
    .fotos-grid img:hover { transform: scale(1.03); }

    .sin-fotos { text-align: center; color: #aaa; padding: 20px; font-size: 14px; }

    .btn-cancelar {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: #eee;
      color: #333;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    
    .lightbox {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .lightbox.activo { display: flex; }
    .lightbox img { max-width: 90%; max-height: 90vh; border-radius: 8px; }
    .lightbox-cerrar {
      position: absolute;
      top: 20px; right: 30px;
      color: white;
      font-size: 32px;
      cursor: pointer;
      background: none;
      border: none;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🏢 Panel Entidad Gubernamental</h1>
    <span id="nombre-entidad"></span>
  </div>
    </div>
    <div class="logofin">
    <img src="logov2.png">
  </div>
  <button class="btn-cerrar" onclick="cerrarSesion()">Cerrar sesión</button>
</header>

<div class="stats">
  <div class="stat-card"><div class="numero" id="stat-total">-</div><div class="etiqueta">Reportes asignados</div></div>
  <div class="stat-card"><div class="numero" id="stat-proceso">-</div><div class="etiqueta">En proceso</div></div>
  <div class="stat-card"><div class="numero" id="stat-solucionado">-</div><div class="etiqueta">Solucionados</div></div>
</div>

<div class="contenido">
  <p class="titulo-seccion">Reportes asignados a mi entidad</p>

  <table>
    <thead>
      <tr>
        <th>#</th>
        <th>Descripción</th>
        <th>Categoría</th>
        <th>Ubicación</th>
        <th>Fecha</th>
        <th>Estado actual</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tabla-reportes">
      <tr><td colspan="7" class="cargando">Cargando reportes...</td></tr>
    </tbody>
  </table>
</div>


<div class="modal-overlay" id="modal-fotos">
  <div class="modal">
    <h2>📷 Imágenes del reporte</h2>
    <div id="fotos-contenido"></div>
    <button class="btn-cancelar" onclick="cerrarModalFotos()">Cerrar</button>
  </div>
</div>


<div class="lightbox" id="lightbox" onclick="cerrarLightbox()">
  <button class="lightbox-cerrar" onclick="cerrarLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="Imagen ampliada">
</div>

<script>
  const API_URL = "https://reporte-ciudadano-production.up.railway.app";

  const sesion = JSON.parse(localStorage.getItem("sesion") || "null");
  if (!sesion || sesion.rol !== "entidad") {
    window.location.href = "login.html";
  } else {
    document.getElementById("nombre-entidad").textContent = sesion.nombre;
  }

  async function cargarReportes() {
    try {
      const res = await fetch(`${API_URL}/entidad/reportes`, {
        headers: { "x-usuario-id": sesion.id, "x-rol": sesion.rol }
      });
      const data = await res.json();

      document.getElementById("stat-total").textContent = data.length;
      document.getElementById("stat-proceso").textContent = data.filter(r => r.estado === "En proceso").length;
      document.getElementById("stat-solucionado").textContent = data.filter(r => r.estado === "Solucionado").length;

      const tbody = document.getElementById("tabla-reportes");
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="cargando">No tienes reportes asignados</td></tr>`;
        return;
      }

      tbody.innerHTML = data.map(r => `
        <tr>
          <td>${r.id}</td>
          <td>${r.descripcion}</td>
          <td>${r.categoria || '-'}</td>
          <td>${r.ubicacion}</td>
          <td>${new Date(r.fecha).toLocaleDateString("es-CO")}</td>
          <td><span class="estado-badge estado-${r.estado}">${r.estado}</span></td>
          <td>
            <div class="acciones">
              <select class="estado-select" id="estado-${r.id}">
                <option value="Asignado"    ${r.estado === "Asignado"    ? "selected" : ""}>Asignado</option>
                <option value="En proceso"  ${r.estado === "En proceso"  ? "selected" : ""}>En proceso</option>
                <option value="Solucionado" ${r.estado === "Solucionado" ? "selected" : ""}>Solucionado</option>
              </select>
              <button class="btn-guardar" onclick="actualizarEstado(${r.id})">Guardar</button>
              <button class="btn-fotos"   onclick="verFotos(${r.id})">📷 Fotos</button>
            </div>
          </td>
        </tr>
      `).join("");

    } catch (err) {
      console.error(err);
    }
  }

  async function actualizarEstado(reporteId) {
    const estado = document.getElementById(`estado-${reporteId}`).value;
    try {
      const res = await fetch(`${API_URL}/entidad/estado/${reporteId}`, {
        method: "PUT",
        headers: {
          "Content-Type": "application/json",
          "x-usuario-id": sesion.id,
          "x-rol": sesion.rol
        },
        body: JSON.stringify({ estado })
      });
      const data = await res.json();
      alert(data.message);
      cargarReportes();
    } catch (err) {
      alert("Error al actualizar el estado");
    }
  }

  async function verFotos(reporteId) {
    const contenido = document.getElementById("fotos-contenido");
    contenido.innerHTML = "<p style='text-align:center;color:#666;'>Cargando imágenes...</p>";
    document.getElementById("modal-fotos").classList.add("activo");

    try {
      const res = await fetch(`${API_URL}/entidad/reportes/${reporteId}/imagenes`, {
        headers: { "x-usuario-id": sesion.id, "x-rol": sesion.rol }
      });
      const imagenes = await res.json();

      if (imagenes.length === 0) {
        contenido.innerHTML = `<p class="sin-fotos">📷 Este reporte no tiene imágenes adjuntas.</p>`;
        return;
      }

      contenido.innerHTML = `
        <div class="fotos-grid">
          ${imagenes.map(img => `
            <img src="${img.ruta}" alt="Imagen del reporte" onclick="abrirLightbox('${img.ruta}')">
          `).join("")}
        </div>
      `;
    } catch (err) {
      contenido.innerHTML = `<p class="sin-fotos">Error al cargar las imágenes.</p>`;
    }
  }

  function abrirLightbox(url) {
    document.getElementById("lightbox-img").src = url;
    document.getElementById("lightbox").classList.add("activo");
  }

  function cerrarLightbox() {
    document.getElementById("lightbox").classList.remove("activo");
  }

  function cerrarModalFotos() {
    document.getElementById("modal-fotos").classList.remove("activo");
  }

  function cerrarSesion() {
    localStorage.removeItem("sesion");
    window.location.href = "login.html";
  }

  cargarReportes();
</script>

</body>
</html>
